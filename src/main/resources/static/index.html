<!DOCTYPE html>
<html>
<head>
    <title>MiniSearch</title>

    <style>

        body{
            font-family:Arial;
            text-align:center;
            margin-top:100px;
            background:#f5f5f5;
        }

        input{
            width:500px;
            padding:12px;
            font-size:18px;
        }

        button{
            padding:12px 20px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<h1>MiniSearch</h1>

<input id="query" placeholder="Search...">

<button onclick="search()">Search</button>

<script>

function search(){

    let q=document.getElementById("query").value;

    window.location="/search?q="+encodeURIComponent(q);

}

</script>

</body>

</html>
